name: Build Signed Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['client/**']
    tags: [v*]

jobs:
  build-signed:
    name: Build Signed Release APK
    runs-on: docker
    container:
      image: data.forgejo.org/oci/node:20
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch=${GITHUB_REF_NAME} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . 2>/dev/null || \
          (git clone --depth=50 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . && git checkout ${GITHUB_SHA})

      - name: Install Java 17
        run: |
          apt-get update && apt-get install -y wget unzip
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.13%2B11/OpenJDK17U-jdk_x64_linux_hotspot_17.0.13_11.tar.gz -O /tmp/jdk.tar.gz
          mkdir -p /opt/java && tar -xzf /tmp/jdk.tar.gz -C /opt/java --strip-components=1
          echo "/opt/java/bin" >> $GITHUB_PATH
          echo "JAVA_HOME=/opt/java" >> $GITHUB_ENV

      - name: Install Android SDK
        run: |
          mkdir -p /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
          mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          echo "/opt/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/opt/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > client/google-services.json

      - name: Generate native code
        working-directory: ./client
        run: npx expo prebuild --platform android --clean

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > client/android/rstify-release.keystore

      - name: Configure signing
        working-directory: ./client/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "RSTIFY_RELEASE_STORE_FILE=../rstify-release.keystore" >> gradle.properties
          echo "RSTIFY_RELEASE_KEY_ALIAS=$KEY_ALIAS" >> gradle.properties
          echo "RSTIFY_RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "RSTIFY_RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> gradle.properties

      - name: Update build.gradle for signing
        working-directory: ./client/android/app
        run: |
          printf '\nandroid.signingConfigs {\n    release {\n        def props = new Properties()\n        file("../gradle.properties").withInputStream { props.load(it) }\n        storeFile file(props.getProperty("RSTIFY_RELEASE_STORE_FILE"))\n        storePassword props.getProperty("RSTIFY_RELEASE_STORE_PASSWORD")\n        keyAlias props.getProperty("RSTIFY_RELEASE_KEY_ALIAS")\n        keyPassword props.getProperty("RSTIFY_RELEASE_KEY_PASSWORD")\n    }\n}\nandroid.buildTypes.release.signingConfig android.signingConfigs.release\n' >> build.gradle

      - name: Build Signed Release APK
        working-directory: ./client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f client/android/rstify-release.keystore
