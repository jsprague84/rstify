# Mirror to GitHub
#
# Pushes all commits and tags to GitHub mirror after every push to Forgejo.
# Requires GH_PAT secret with contents:write scope.

name: Mirror to GitHub

on:
  push:
    branches: [master]
    tags: [v*]

jobs:
  mirror:
    name: Push to GitHub
    runs-on: docker
    container:
      image: git.js-node.cc/jsprague/rust-ci:latest
    steps:
      - name: Checkout
        run: |
          git clone --depth=50 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . 2>/dev/null || \
          (git init && git remote add origin ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git && git fetch origin && git checkout ${GITHUB_SHA})

      - name: Push to GitHub mirror
        run: |
          git remote add github https://x-access-token:${{ secrets.GH_PAT }}@github.com/jsprague84/rstify.git 2>/dev/null || true
          git push github HEAD:master --force
          git push github --tags --force 2>/dev/null || true
