name: Mirror to GitHub

on:
  push:
    branches: [master]
    tags: [v*]

jobs:
  mirror:
    runs-on: docker
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch=${GITHUB_REF_NAME} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . 2>/dev/null || \
          (git clone --depth=50 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . && git checkout ${GITHUB_SHA})

      - name: Push to GitHub mirror
        run: |
          git remote add github https://x-access-token:${{ secrets.GH_PAT }}@github.com/jsprague84/rstify.git || true
          git push github HEAD:master --tags --force
