name: Docker Image

on:
  push:
    branches: [master]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: git.js-node.cc
  IMAGE_NAME: jsprague/rstify

jobs:
  test:
    runs-on: docker
    container:
      image: data.forgejo.org/oci/node:20
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch=${GITHUB_REF_NAME} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . 2>/dev/null || \
          (git clone --depth=50 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . && git checkout ${GITHUB_SHA})

      - name: Build web UI
        run: cd web-ui && npm ci && npm run build

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component clippy,rustfmt
          . "$HOME/.cargo/env"

      - name: Check formatting
        run: |
          . "$HOME/.cargo/env"
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          . "$HOME/.cargo/env"
          cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: |
          . "$HOME/.cargo/env"
          cargo test --workspace

  build-and-push:
    needs: test
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Forgejo registry
        run: echo "${{ secrets.RSTIFY_FORGEJO_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.FORGEJO_USER }} --password-stdin

      - name: Determine tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS="${IMAGE}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Building tags: ${TAGS}"

      - name: Build Docker image
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          TAG_FLAGS=""
          for tag in "${TAG_ARRAY[@]}"; do
            TAG_FLAGS="${TAG_FLAGS} -t ${tag}"
          done
          docker build ${TAG_FLAGS} .

      - name: Push Docker image
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            docker push "${tag}"
          done
