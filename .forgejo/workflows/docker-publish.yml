name: Docker Image

on:
  push:
    branches: [master]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: git.js-node.cc
  IMAGE_NAME: jsprague/rstify

jobs:
  test:
    runs-on: docker
    container:
      image: data.forgejo.org/oci/node:20
    steps:
      - name: Checkout
        run: |
          git clone --depth=1 --branch=${GITHUB_REF_NAME} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . 2>/dev/null || \
          (git clone --depth=50 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . && git checkout ${GITHUB_SHA})

      - name: Build web UI
        run: cd web-ui && npm ci && npm run build

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component clippy,rustfmt
          . "$HOME/.cargo/env"

      - name: Check formatting
        run: |
          . "$HOME/.cargo/env"
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          . "$HOME/.cargo/env"
          cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: |
          . "$HOME/.cargo/env"
          cargo test --workspace

  build-and-push:
    needs: test
    runs-on: docker
    container:
      image: docker:27-cli
      options: >-
        -e DOCKER_HOST=tcp://docker:2376
        -e DOCKER_TLS_VERIFY=1
        -e DOCKER_CERT_PATH=/certs/client
        -v /certs:/certs:ro
    steps:
      - name: Install git
        run: apk add --no-cache git

      - name: Checkout
        run: |
          git clone --depth=1 --branch=${GITHUB_REF_NAME} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . 2>/dev/null || \
          (git clone --depth=50 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . && git checkout ${GITHUB_SHA})

      - name: Login to Forgejo registry
        run: echo "${{ secrets.RSTIFY_FORGEJO_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.FORGEJO_USER }} --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker build -t "${IMAGE}:latest" .
          docker push "${IMAGE}:latest"
          if echo "${GITHUB_REF}" | grep -q "^refs/tags/v"; then
            VERSION=$(echo "${GITHUB_REF}" | sed 's|refs/tags/v||')
            docker tag "${IMAGE}:latest" "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:${VERSION}"
          fi
