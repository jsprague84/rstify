name: Docker Image

on:
  push:
    branches: [master]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: git.js-node.cc
  IMAGE_NAME: jsprague/rstify

jobs:
  test:
    runs-on: docker
    container:
      image: data.forgejo.org/oci/node:20
    steps:
      - uses: actions/checkout@v4

      - name: Build web UI
        run: cd web-ui && npm ci && npm run build

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component clippy,rustfmt
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Check formatting
        run: $HOME/.cargo/bin/cargo fmt --all -- --check

      - name: Run clippy
        run: $HOME/.cargo/bin/cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: $HOME/.cargo/bin/cargo test --workspace

  build-and-push:
    needs: test
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.FORGEJO_USER }}
          password: ${{ secrets.RSTIFY_FORGEJO_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
