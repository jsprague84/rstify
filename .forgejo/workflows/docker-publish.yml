# rstify Docker Image Build
#
# Builds and pushes Docker image to Forgejo container registry.
#
# IMPORTANT: Requires runner config update for Docker access:
#   In /home/ubuntu/docker/forgejo/runner-data/config.yml, set:
#     container:
#       docker_host: "tcp://docker:2376"
#       valid_volumes:
#         - /ci-cache/**
#         - /certs/client
#       options: "-e DOCKER_TLS_VERIFY=1 -e DOCKER_CERT_PATH=/certs/client -v /certs/client:/certs/client:ro"
#
#   Then: docker compose restart forgejo-runner
#
# Without this config change, the Docker build job will fail.
# Alternative: Use GitHub Actions for Docker builds (see .github/workflows/).

name: Docker Image

on:
  push:
    branches: [master]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: git.js-node.cc
  IMAGE_NAME: jsprague/rstify

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: docker
    container:
      image: docker:27-cli
      env:
        DOCKER_HOST: tcp://docker:2376
        DOCKER_TLS_VERIFY: "1"
        DOCKER_CERT_PATH: /certs/client
      volumes:
        - /certs/client:/certs/client:ro
    steps:
      - name: Install git
        run: apk add --no-cache git

      - name: Checkout
        run: |
          git clone --depth=1 --branch=${GITHUB_REF_NAME} ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . 2>/dev/null || \
          (git clone --depth=50 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git . && git checkout ${GITHUB_SHA})

      - name: Login to Forgejo registry
        run: echo "${{ secrets.RSTIFY_FORGEJO_TOKEN }}" | docker login ${REGISTRY} -u ${{ secrets.FORGEJO_USER }} --password-stdin

      - name: Build and push
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          docker build -t "${IMAGE}:latest" .
          docker push "${IMAGE}:latest"
          if echo "${GITHUB_REF}" | grep -q "^refs/tags/v"; then
            VERSION=$(echo "${GITHUB_REF}" | sed 's|refs/tags/v||')
            docker tag "${IMAGE}:latest" "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:${VERSION}"
          fi
