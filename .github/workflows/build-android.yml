name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - master
    paths:
      - 'client/**'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Generate native code with Expo prebuild
        working-directory: ./client
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: ./client/android
        run: chmod +x gradlew

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        working-directory: ./client/android
        run: ./gradlew assembleDebug

      - name: Build Release APK (unsigned)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: ./client/android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rstify-debug.apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: rstify-release.apk
          path: client/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Comment on PR with APK
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📱 Android APK built successfully! Download from the artifacts section above.'
            })
