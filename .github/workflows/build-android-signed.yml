name: Build Signed Android APK

# This workflow builds a SIGNED release APK using your keystore
# Requires secrets to be configured in GitHub repository settings

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-signed:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > client/google-services.json

      - name: Generate native code with Expo prebuild
        working-directory: ./client
        run: npx expo prebuild --platform android --clean

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > client/android/rstify-release.keystore
          ls -la client/android/rstify-release.keystore

      - name: Configure signing
        working-directory: ./client/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "RSTIFY_RELEASE_STORE_FILE=../rstify-release.keystore" >> gradle.properties
          echo "RSTIFY_RELEASE_KEY_ALIAS=$KEY_ALIAS" >> gradle.properties
          echo "RSTIFY_RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "RSTIFY_RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> gradle.properties
          echo "--- gradle.properties signing entries ---"
          grep RSTIFY gradle.properties

      - name: Update build.gradle for signing
        working-directory: ./client/android/app
        run: |
          printf '\nandroid.signingConfigs {\n    release {\n        def props = new Properties()\n        file("../gradle.properties").withInputStream { props.load(it) }\n        storeFile file(props.getProperty("RSTIFY_RELEASE_STORE_FILE"))\n        storePassword props.getProperty("RSTIFY_RELEASE_STORE_PASSWORD")\n        keyAlias props.getProperty("RSTIFY_RELEASE_KEY_ALIAS")\n        keyPassword props.getProperty("RSTIFY_RELEASE_KEY_PASSWORD")\n    }\n}\nandroid.buildTypes.release.signingConfig android.signingConfigs.release\n' >> build.gradle

      - name: Make gradlew executable
        working-directory: ./client/android
        run: chmod +x gradlew

      - name: Build Signed Release APK
        working-directory: ./client/android
        run: ./gradlew assembleRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: rstify-release-signed.apk
          path: client/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: client/android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f client/android/rstify-release.keystore
