name: Docker Image

on:
  push:
    branches: [master]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jsprague84/rstify

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd web-ui && npm ci && npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - name: Verify generated types are up-to-date
        run: |
          TS_RS_EXPORT_DIR=$(pwd)/shared/generated cargo test --workspace 2>&1 | tail -1
          find shared/generated -name '*.ts' -exec sed -i 's/bigint/number/g' {} +
          echo '// Auto-generated barrel export — do not hand-edit' > shared/generated/index.ts
          echo '// Re-run: just generate-types' >> shared/generated/index.ts
          echo '' >> shared/generated/index.ts
          for f in shared/generated/*.ts; do
            name=$(basename "$f" .ts)
            [ "$name" = "index" ] && continue
            echo "export * from \"./$name\";" >> shared/generated/index.ts
          done
          echo 'export * from "./serde_json/JsonValue";' >> shared/generated/index.ts
          if ! git diff --exit-code shared/generated/; then
            echo "ERROR: Generated types are out of date. Run 'just generate-types' and commit."
            exit 1
          fi

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
