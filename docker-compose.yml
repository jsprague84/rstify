services:
  rstify:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
      - "1883:1883"    # MQTT TCP
      - "8083:8083"    # MQTT WebSocket
    volumes:
      - rstify_data:/data
      - rstify_uploads:/uploads
    environment:
      # These override .env values — only set what must differ in Docker
      - DATABASE_URL=sqlite:///data/rstify.db
      - UPLOAD_DIR=/uploads

volumes:
  rstify_data:
  rstify_uploads:
